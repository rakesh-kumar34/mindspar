# Delivers Web Push notifications for async duels (challenges + results).
# Runs on a schedule — async duels tolerate a few minutes of latency by
# nature. Also triggerable by hand from the Actions tab.
name: Send push notifications
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
permissions: {}
concurrency:
  group: push-sender
  cancel-in-progress: false
jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-save firebase-admin web-push
      - run: node tools/push/send.mjs
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SA }}
          VAPID_PUBLIC: ${{ secrets.VAPID_PUBLIC }}
          VAPID_PRIVATE: ${{ secrets.VAPID_PRIVATE }}
