<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <title>Mindspar</title>
  <meta name="description" content="Head-to-head thinking duels. Reasoning, math, verbal, knowledge, science, patterns.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Mindspar">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#f6f6f9" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0e0f15" media="(prefers-color-scheme: dark)">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
  <script>
    // Apply the saved theme before paint so there's no light-mode flash.
    try { document.documentElement.setAttribute("data-theme",
      localStorage.getItem("mindspar-theme") || "dark"); } catch (e) {}
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <div class="screen" id="screen" aria-live="polite"><div class="loading"><span class="spin"></span></div></div>
    <nav class="tabs" id="tabs" style="display:none">
      <button class="tab on" id="t-play"><i class="tico" data-ic="play"></i><span>Play</span></button>
      <button class="tab" id="t-friends"><i class="tico" data-ic="friends"></i><span>Friends</span><i class="badge" id="fr-badge"></i></button>
      <button class="tab" id="t-prof"><i class="tico" data-ic="profile"></i><span>Profile</span></button>
    </nav>
    <div class="arena" id="arena"></div>
    <div class="chat" id="chat"></div>
    <div class="overlay" id="overlay"></div>
    <div class="toast" id="toast" role="status"></div>
  </main>
  <script type="module" src="app.js?v=16"></script>
</body>
</html>
