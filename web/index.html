<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
  <!-- Defense-in-depth: even if an escape were ever missed, injected markup
       can't load foreign scripts or exfiltrate to arbitrary hosts. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.gstatic.com; connect-src 'self' https://*.googleapis.com; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; font-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; frame-src 'none'">
  <meta name="referrer" content="no-referrer">
  <title>Synapse</title>
  <meta name="description" content="The thinking person's arena. Head-to-head thinking duels across reasoning, math, verbal, knowledge, science, patterns, history and geography.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Synapse">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#F3EDE0" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#171310" media="(prefers-color-scheme: dark)">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23241C0F'/><text x='44' y='76' text-anchor='middle' font-family='Georgia,serif' font-size='78' fill='%23FFFDF7'>S</text><circle cx='78' cy='68' r='9' fill='%23D95B43'/></svg>">
  <script>
    // Apply the saved theme before paint so there's no light-mode flash.
    try { document.documentElement.setAttribute("data-theme",
      localStorage.getItem("mindspar-theme") || "dark"); } catch (e) {}
  </script>
  <link rel="preload" href="fonts/instrument-serif.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="style.css?v=35">
</head>
<body>
  <main class="app">
    <div class="screen" id="screen" aria-live="polite"><div class="loading"><div class="splash">Synapse.</div><span class="spin"></span></div></div>
    <nav class="tabs" id="tabs" style="display:none">
      <div class="side-brand">Synapse<i>.</i></div>
      <button class="tab on" id="t-play"><i class="tico" data-ic="play"></i><span>Play</span></button>
      <button class="tab" id="t-stats"><i class="tico" data-ic="chart"></i><span>Stats</span></button>
      <button class="tab" id="t-friends"><i class="tico" data-ic="friends"></i><span>Friends</span><i class="badge" id="fr-badge"></i></button>
      <button class="tab" id="t-prof"><i class="tico" data-ic="profile"></i><span>Profile</span></button>
    </nav>
    <div class="arena" id="arena"></div>
    <div class="chat" id="chat"></div>
    <div class="overlay" id="overlay"></div>
    <div class="toast" id="toast" role="status"></div>
  </main>
  <script type="module" src="app.js?v=35"></script>
</body>
</html>
